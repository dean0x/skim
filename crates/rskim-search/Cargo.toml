[package]
name = "rskim-search"
version = "2.0.0"
edition = "2021"
authors = ["Skim Contributors"]
license = "MIT"
description = "Search and indexing layer for skim's code intelligence"
repository = "https://github.com/dean0x/skim"

[dependencies]
rskim-core = { version = "2.0.0", path = "../rskim-core" }
tree-sitter = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
todo = "warn"

[lib]
name = "rskim_search"
path = "src/lib.rs"
