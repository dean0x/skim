# Corpus configuration for rskim-research AST n-gram IDF analysis.
# Covers all 14 tree-sitter languages: TypeScript, JavaScript, Python, Rust, Go,
# Java, C, C++, C#, Ruby, SQL, Kotlin, Swift, Markdown.
#
# The language field marks the PRIMARY language of the repo.
# The walker uses file extensions to assign language per file, not this field.
# SQL and Markdown files are extracted from polyglot repos (django, spring-boot,
# kubernetes, etc.) — no dedicated entries are needed for them.
#
# New repos use commit = "HEAD" as a placeholder; the extractor clones at HEAD.
#
# Run `rskim-research ast-run` to clone and analyze all repos.

