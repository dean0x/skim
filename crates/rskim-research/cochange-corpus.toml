# Corpus configuration for co-change validation benchmark.
#
# These repos are selected for:
#   - ≥6 months of active development history
#   - ≥50 multi-file commits (co-change signal present)
#   - At least 3 languages represented across the set
#   - Medium-sized repos (not linux-scale)
#
# All entries use deep_clone = true so GixSource receives full git history.
# The `language` field is required by the shared RepoEntry type but is not
# used by the co-change validator (it operates on raw file paths).

# ---- Rust ----

[[repos]]
url = "https://github.com/BurntSushi/ripgrep"
commit = "4519153e5e461527f4bca45b042fff45c4ec6fb9"
language = "Rust"
deep_clone = true

